version: "3.9"
 
services:
 
  app:
    build: .
    container_name: locker_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV:    production
      PORT:        5000
 
      # Cloud MySQL
      DB_HOST:     your_db_host_here
      DB_PORT:     your_db_port_here
      DB_USER:     your_db_user_here
      DB_PASSWORD: your_db_password_here
      DB_NAME:     your_db_name_here
 
      # JWT
      JWT_SECRET:     ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
 
      # Email
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}